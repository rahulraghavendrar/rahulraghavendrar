name: Update Stats Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG
        run: |
          YEAR=$(date +%Y)
          CONTRIBUTIONS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/search/commits?q=author:rahulraghavendrar+committer-date:${YEAR}-01-01..${YEAR}-12-31&per_page=1" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_count', 0))")

          cat > stats.svg << SVGEOF
          <svg width="420" height="165" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="165" rx="12" fill="#0d1117"/>
            <text x="20" y="40" font-family="monospace" font-size="14" fill="#38bdf8" font-weight="600">📊 This Year's Contributions</text>
            <line x1="20" y1="55" x2="400" y2="55" stroke="#1e293b" stroke-width="1"/>
            <text x="20" y="105" font-family="monospace" font-size="58" font-weight="bold" fill="#c4b5fd">${CONTRIBUTIONS}</text>
            <text x="20" y="140" font-family="monospace" font-size="12" fill="#6b7280">commits in ${YEAR} · updates daily</text>
          </svg>
          SVGEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --cached --quiet || git commit -m "chore: update stats [skip ci]"
          git push
