name: Update Stats Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVGs via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR=$(date +%Y)
          LAST_YEAR=$((YEAR - 1))

          THIS_YEAR=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" -X POST \
            -d "{\"query\": \"{ user(login: \\\"rahulraghavendrar\\\") { contributionsCollection(from: \\\"${YEAR}-01-01T00:00:00Z\\\", to: \\\"${YEAR}-12-31T23:59:59Z\\\") { contributionCalendar { totalContributions } } } }\"}" \
            https://api.github.com/graphql | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions'])")

          LAST=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" -X POST \
            -d "{\"query\": \"{ user(login: \\\"rahulraghavendrar\\\") { contributionsCollection(from: \\\"${LAST_YEAR}-01-01T00:00:00Z\\\", to: \\\"${LAST_YEAR}-12-31T23:59:59Z\\\") { contributionCalendar { totalContributions } } } }\"}" \
            https://api.github.com/graphql | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions'])")

          cat > stats-this-year.svg << SVGEOF
          <svg width="200" height="165" xmlns="http://www.w3.org/2000/svg">
            <rect width="200" height="165" rx="12" fill="#0d1117"/>
            <text x="16" y="38" font-family="monospace" font-size="12" fill="#38bdf8" font-weight="600">${YEAR} Contributions</text>
            <line x1="16" y1="50" x2="184" y2="50" stroke="#1e293b" stroke-width="1"/>
            <text x="16" y="108" font-family="monospace" font-size="58" font-weight="bold" fill="#c4b5fd">${THIS_YEAR}</text>
            <text x="16" y="140" font-family="monospace" font-size="11" fill="#6b7280">updates daily</text>
          </svg>
          SVGEOF

          cat > stats-last-year.svg << SVGEOF
          <svg width="200" height="165" xmlns="http://www.w3.org/2000/svg">
            <rect width="200" height="165" rx="12" fill="#0d1117"/>
            <text x="16" y="38" font-family="monospace" font-size="12" fill="#f472b6" font-weight="600">${LAST_YEAR} Contributions</text>
            <line x1="16" y1="50" x2="184" y2="50" stroke="#1e293b" stroke-width="1"/>
            <text x="16" y="108" font-family="monospace" font-size="58" font-weight="bold" fill="#a78bfa">${LAST}</text>
            <text x="16" y="140" font-family="monospace" font-size="11" fill="#6b7280">updates daily</text>
          </svg>
          SVGEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats-this-year.svg stats-last-year.svg
          git diff --cached --quiet || git commit -m "chore: update stats [skip ci]"
          git push
