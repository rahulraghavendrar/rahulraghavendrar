name: Update Stats Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch contribution count
        id: stats
        run: |
          CONTRIBUTIONS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/search/commits?q=author:rahulraghavendrar&per_page=1" \
            -H "Accept: application/vnd.github.cloak-preview" | jq '.total_count')
          echo "count=$CONTRIBUTIONS" >> $GITHUB_OUTPUT

      - name: Generate SVG
        run: |
          cat > stats.svg << EOF
          <svg width="400" height="100" xmlns="http://www.w3.org/2000/svg">
            <rect width="400" height="100" rx="10" fill="#0d1117"/>
            <text x="20" y="35" font-family="monospace" font-size="13" fill="#38bdf8">Total Commits</text>
            <text x="20" y="70" font-family="monospace" font-size="36" font-weight="bold" fill="#c4b5fd">${{ steps.stats.outputs.count }}</text>
          </svg>
          EOF

      - uses: actions/upload-artifact@v3
        with:
          name: stats
          path: stats.svg

      - name: Commit SVG
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stats.svg
          git diff --cached --quiet || git commit -m "Update stats"
          git push
