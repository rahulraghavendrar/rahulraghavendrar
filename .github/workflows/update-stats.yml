name: Update Stats Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVGs via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR=$(date +%Y)

          CONTRIBUTIONS=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" -X POST \
            -d "{\"query\": \"{ user(login: \\\"rahulraghavendrar\\\") { contributionsCollection(from: \\\"${YEAR}-01-01T00:00:00Z\\\", to: \\\"${YEAR}-12-31T23:59:59Z\\\") { contributionCalendar { totalContributions } } } }\"}" \
            https://api.github.com/graphql | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions'])")

          cat > stats-this-year.svg << SVGEOF
          <svg width="200" height="165" xmlns="http://www.w3.org/2000/svg">
            <rect width="200" height="165" rx="12" fill="#0d1117"/>
            <text x="16" y="38" font-family="monospace" font-size="12" fill="#38bdf8" font-weight="600">${YEAR} Contributions</text>
            <line x1="16" y1="50" x2="184" y2="50" stroke="#1e293b" stroke-width="1"/>
            <text x="16" y="108" font-family="monospace" font-size="58" font-weight="bold" fill="#c4b5fd">${CONTRIBUTIONS}</text>
            <text x="16" y="145" font-family="monospace" font-size="11" fill="#6b7280">updates daily</text>
          </svg>
          SVGEOF

          pip install PyGithub --quiet --break-system-packages

          python3 << 'PYEOF'
          import os, json
          from github import Github

          g = Github(os.environ["GH_TOKEN"])
          user = g.get_user("rahulraghavendrar")
          repos = user.get_repos()

          lang_bytes = {}
          for repo in repos:
              if repo.fork:
                  continue
              try:
                  langs = repo.get_languages()
                  for lang, count in langs.items():
                      lang_bytes[lang] = lang_bytes.get(lang, 0) + count
              except:
                  pass

          total = sum(lang_bytes.values()) or 1
          sorted_langs = sorted(lang_bytes.items(), key=lambda x: x[1], reverse=True)[:6]

          colors = ["#38bdf8","#a78bfa","#f472b6","#34d399","#fbbf24","#fb923c"]
          bar_height = 14
          gap = 10
          svg_height = 165
          svg_width = 220
          label_x = 16
          bar_x = 90
          bar_max_w = 110

          rows = ""
          for i, (lang, count) in enumerate(sorted_langs):
              pct = count / total * 100
              bar_w = int(pct / 100 * bar_max_w)
              y = 52 + i * (bar_height + gap)
              color = colors[i % len(colors)]
              rows += f'''
              <text x="{label_x}" y="{y + 11}" font-family="monospace" font-size="11" fill="#94a3b8">{lang[:10]}</text>
              <rect x="{bar_x}" y="{y}" width="{bar_w}" height="{bar_height}" rx="3" fill="{color}"/>
              <text x="{bar_x + bar_w + 4}" y="{y + 11}" font-family="monospace" font-size="10" fill="{color}">{pct:.1f}%</text>
              '''

          svg = f'''<svg width="{svg_width}" height="{svg_height}" xmlns="http://www.w3.org/2000/svg">
            <rect width="{svg_width}" height="{svg_height}" rx="12" fill="#0d1117"/>
            <text x="16" y="38" font-family="monospace" font-size="12" fill="#38bdf8" font-weight="600">Top Languages</text>
            <line x1="16" y1="50" x2="{svg_width - 16}" y2="50" stroke="#1e293b" stroke-width="1"/>
            {rows}
          </svg>'''

          with open("stats-languages.svg", "w") as f:
              f.write(svg)
          print("Generated stats-languages.svg")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats-this-year.svg stats-languages.svg
          git diff --cached --quiet || git commit -m "chore: update stats [skip ci]"
          git push
