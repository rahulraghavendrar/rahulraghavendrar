name: Update Stats Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR=$(date +%Y)
          FROM="${YEAR}-01-01T00:00:00Z"
          TO="${YEAR}-12-31T23:59:59Z"

          CONTRIBUTIONS=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"query\": \"{ user(login: \\\"rahulraghavendrar\\\") { contributionsCollection(from: \\\"${FROM}\\\", to: \\\"${TO}\\\") { contributionCalendar { totalContributions } } } }\"}" \
            https://api.github.com/graphql | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions'])")

          cat > stats.svg << SVGEOF
          <svg width="420" height="165" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="165" rx="12" fill="#0d1117"/>
            <text x="20" y="40" font-family="monospace" font-size="14" fill="#38bdf8" font-weight="600">📊 ${YEAR} Contributions</text>
            <line x1="20" y1="55" x2="400" y2="55" stroke="#1e293b" stroke-width="1"/>
            <text x="20" y="110" font-family="monospace" font-size="62" font-weight="bold" fill="#c4b5fd">${CONTRIBUTIONS}</text>
            <text x="20" y="145" font-family="monospace" font-size="12" fill="#6b7280">total in ${YEAR} · auto-updates daily</text>
          </svg>
          SVGEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --cached --quiet || git commit -m "chore: update stats [skip ci]"
          git push
